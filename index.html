<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jogos Go - Official site of the Jogos Go YouTube channel. Find the latest videos, channel statistics, and social media links.">
    <title>Jogos Go | Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="profile-container">
                <div class="profile-picture" id="profile-picture"></div>
                <div class="profile-name" id="profile-name">Name</div>
            </div>
            <ul class="menu">
                <li><a href="#about">About</a></li>
                <li><a href="#stats">Stats</a></li>
                <li><a href="#videos">Videos</a></li>
                <li><a href="#social">Social</a></li>
            </ul>
        </div>
        <div class="main-content">
            <div id="about" class="about-section">
                <h2>About</h2>
                <p>Welcome to the official website of Jogos Go! Here you'll find information about my YouTube channel, including the latest videos, statistics, and links to my social media profiles.</p>
            </div>
            <div id="stats" class="stats">
                <div class="stat-box">
                    <div class="stat-label">Subs</div>
                    <div class="stat-value" id="subs">NUM</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Views</div>
                    <div class="stat-value" id="views">NUM</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Videos</div>
                    <div class="stat-value" id="videos-num">NUM</div>
                </div>
            </div>
            <div id="videos" class="videos-section">
                <h2>Videos</h2>
                <div class="video-grid" id="video-grid">
                    <!-- Video thumbnails will be injected here -->
                </div>
            </div>
        </div>
    </div>
    <div class="social" id="social">
        <a href="https://discord.gg/R59BsTpvVM" target="_blank">
            <img src="discord.png" alt="Discord">
        </a>
        <a href="https://twitter.com/@jogosgo" target="_blank">
            <img src="twitter.png" alt="Twitter">
        </a>
        <a href="https://www.youtube.com/@jogosgo" target="_blank">
            <img src="youtube.png" alt="YouTube">
        </a>
        <a href="https://www.tiktok.com/@jogosgoficial" target="_blank">
            <img src="tiktok.png" alt="TikTok">
        </a>
        <a href="https://instagram.com/jogosgo/" target="_blank">
            <img src="instagram.png" alt="Instagram">
        </a>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
