<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogos Go</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-image: url("wallpaper.png");
      background-size: cover;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #333;
    }
    .header {
      background-color: rgba(255, 255, 255, 0.8);
      padding: 10px;
      text-align: center;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    .logo {
      width: 80px;
      height: 80px;
    }
    .logo img {
      width: 100%;
      height: auto;
    }
    .title {
      font-size: 24px;
    }
    .icon-group {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .icon-link {
      display: inline-block;
      width: 100px;
      height: 100px;
      margin: 10px;
      transition: transform 0.2s, opacity 0.2s;
    }
    .icon-link img {
      width: 100%;
      height: auto;
      cursor: pointer;
    }
    .icon-link img:hover {
      transform: scale(1.1);
    }
    .subscriber-count {
      margin-top: 20px;
    }
    .subscriber-count iframe {
      width: 100%;
      max-width: 310px;
      height: auto;
      border: none;
    }
    .support-text {
      margin-top: 10px;
      font-size: 18px;
    }
    .description {
      text-align: center;
      margin-top: 20px;
      padding: 0 20px;
      font-size: 18px;
    }
    .projects {
      margin-top: 20px;
      text-align: center;
      background-color: rgba(255, 255, 255, 0.8);
      padding: 20px;
      width: 100%;
    }
  </style>
  <script src="https://yvoschaap.com/ytpage/ytembed.js"></script>
</head>
<body>
  <div class="header">
    <div class="logo">
      <img src="logo.png" alt="Jogos Go Logo">
    </div>
    <div class="title">Jogos Go</div>
    <div class="subscriber-count">
      <iframe height="90px" width="100%" frameborder="0" src="https://socialcounts.org/youtube-live-subscriber-count/UCN53mD7dL_gu6efYoUy24dw/embed" allowFullScreen></iframe>
      <div class="support-text">Subscribe to support me!</div>
    </div>
  </div>
  <div class="description">
    Hi, I'm Jogos Go! A YouTuber and coder. I love Minecraft, Roblox, and Undertale.
  </div>
  <div class="content">
    <div class="projects">
      <div class="icon-group">
        <a href="https://github.com/JogosGo" class="icon-link" target="_blank">
          <img src="github.png" alt="GitHub Logo">
        </a>
        <a href="https://www.discord.gg/Tynt5CbWpW" class="icon-link" target="_blank">
          <img src="discord.png" alt="Discord Logo">
        </a>
        <a href="https://www.youtube.com/@jogosgo/featured" class="icon-link" target="_blank">
          <img src="sub.png" alt="Subscribe Button">
        </a>
        <a href="https://github.com/JogosGo/Undertale-Save-Manger" class="icon-link" target="_blank">
          <img src="save.png" alt="Save Button">
        </a>
      </div>
    </div>
  </div>
</body>
</html>
